name: PR Validation

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java: [21]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Build and test
        run: mvn -B clean verify

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-pr
          path: '**/target/site/jacoco/'
          retention-days: 7

  no-micrometer-smoke:
    name: No-Micrometer smoke (core)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Run no-micrometer profile
        run: mvn -B -pl openflags-core -am -P no-micrometer test

  verify-javadoc:
    name: Javadoc
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Generate Javadoc
        run: mvn -B javadoc:aggregate -Dquiet=true

  all-checks:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [build-and-test, no-micrometer-smoke, verify-javadoc]
    if: always()

    steps:
      - name: Verify all jobs passed
        run: |
          build_result="${{ needs.build-and-test.result }}"
          no_micrometer_result="${{ needs.no-micrometer-smoke.result }}"
          javadoc_result="${{ needs.verify-javadoc.result }}"
          if [[ "$build_result" != "success" || "$no_micrometer_result" != "success" || "$javadoc_result" != "success" ]]; then
            echo "Required checks failed — build: $build_result, no-micrometer: $no_micrometer_result, javadoc: $javadoc_result"
            exit 1
          fi
          echo "All required checks passed."
