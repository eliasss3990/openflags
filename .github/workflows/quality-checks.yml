name: Quality checks

on:
  workflow_call:
    inputs:
      coverage-artifact-name:
        description: Name of the JaCoCo coverage artifact uploaded after build.
        required: false
        type: string
        default: jacoco-report

jobs:
  build-and-test:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Single-version matrix is intentional: Java 21 is the project baseline
        # (ADR-008). Enforced at build time via maven-enforcer requireJavaVersion[21,).
        java: [21]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Build and test
        run: mvn -B clean verify

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.coverage-artifact-name }}
          path: "**/target/site/jacoco/"
          retention-days: 7

  no-micrometer-smoke:
    name: No-Micrometer smoke (core)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Run no-micrometer profile
        run: mvn -B -pl openflags-core -am -P no-micrometer test

  verify-javadoc:
    name: Javadoc
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Generate Javadoc
        run: mvn -B javadoc:aggregate
